<!DOCTYPE html>
<html>
<head>
<title>Login - GMD Gadgets</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

/* TITLE */
h2 {
    margin-bottom: 20px;
    color: #0f172a;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

/* ERROR */
.error {
    color: red;
    font-size: 14px;
}

/* LINK */
a {
    display: block;
    margin-top: 15px;
    color: #2563eb;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<h2>🔐 Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button>Login</button>
</form>

<a href="/signup">Create new account</a>

</div>

</body>
</html>
