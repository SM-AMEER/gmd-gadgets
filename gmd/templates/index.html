<!DOCTYPE html>
<html>
<head>
<title>GMD Gadgets</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f3f4f6;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.menu { position: relative; }

.menu-btn {
    background: transparent;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
}

.header h1 {
    margin: 0;
    font-size: 18px;
}

.cart-btn {
    background: #22c55e;
    padding: 6px 12px;
    border-radius: 6px;
    text-decoration: none;
    color: white;
}

/* BRAND */
.brand-bar {
    background: #111;
    color: #fff;
    text-align: center;
    padding: 6px;
    font-size: 13px;
}

/* SEARCH */
.search-section {
    padding: 12px;
}

.search-box {
    max-width: 600px;
    margin: auto;
    background: white;
    border-radius: 8px;
    border: 1px solid #ddd;
    position: relative;
}

.search-box input {
    width: 100%;
    padding: 12px;
    border: none;
    outline: none;
}

/* SUGGESTIONS */
#suggestions {
    position: absolute;
    width: 100%;
    background: white;
    border: 1px solid #ddd;
    border-top: none;
    z-index: 100;
}

.suggestion-item {
    padding: 10px;
    cursor: pointer;
}

.suggestion-item:hover {
    background: #f3f4f6;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 12px;
}

@media (min-width: 768px) {
    .products {
        grid-template-columns: repeat(4, 1fr);
    }
}

/* CARD */
.card {
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.brand {
    font-size: 10px;
    color: gray;
}

/* BUTTON */
button {
    background: #2563eb;
    color: white;
    padding: 7px;
    border: none;
    width: 100%;
    border-radius: 6px;
    margin-top: 8px;
}

.in-cart {
    background: #22c55e;
}

/* FOOTER */
.footer {
    background: #222;
    color: #fff;
    text-align: center;
    padding: 20px;
}

.footer a {
    color: #38bdf8;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>⚡ GMD Gadgets</h1>
    <a href="/cart" class="cart-btn">🛒</a>
</div>

<!-- BRAND -->
<div class="brand-bar">
    🚀 Powered by <strong>Ariyom Tech Solutions</strong>
</div>

<!-- SEARCH -->
<div class="search-section">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search gadgets..." onkeyup="liveSearch()">
        <div id="suggestions"></div>
    </div>
</div>

<!-- PRODUCTS -->
<div class="products">

{% for p in products %}
<div class="card" data-name="{{ p['name'] }}">

    <img src="{{ p['image'] }}">
    <h3>{{ p['name'] }}</h3>
    <p class="brand">by Ariyom Tech</p>
    <p>₹{{ p['price'] }}</p>

    <a href="/add_to_cart/{{ p['id'] }}">
        <button>Add to Cart</button>
    </a>

</div>
{% endfor %}

</div>

<!-- FOOTER -->
<footer class="footer">
    <h3>Ariyom Tech Solutions</h3>
    <p>📸 
        <a href="https://instagram.com/ariyom_tech_solutions" target="_blank">
            @ariyom_tech_solutions
        </a>
    </p>
</footer>

<script>
function liveSearch() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");
    let box = document.getElementById("suggestions");

    box.innerHTML = "";

    cards.forEach(card => {
        let name = card.getAttribute("data-name").toLowerCase();

        if (name.includes(input)) {
            card.style.display = "block";

            if (input !== "") {
                let div = document.createElement("div");
                div.className = "suggestion-item";
                div.innerText = name;

                div.onclick = () => {
                    document.getElementById("searchInput").value = name;
                    box.innerHTML = "";
                };

                box.appendChild(div);
            }

        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
