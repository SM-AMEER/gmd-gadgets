<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

/* TITLE */
h2 {
    margin-bottom: 20px;
    color: #1e3a8a;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #1d4ed8;
}

/* ERROR */
.error {
    color: red;
    margin-bottom: 10px;
}

/* LINKS */
.links {
    margin-top: 15px;
}

.links a {
    text-decoration: none;
    color: #2563eb;
    font-weight: bold;
}

.links a:hover {
    text-decoration: underline;
}

/* MOBILE */
@media(max-width:500px){
    .login-box {
        margin: 20px;
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="login-box">

    <h2>👤 User Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input name="username" placeholder="Enter Username" required>
        <input name="password" type="password" placeholder="Enter Password" required>
        <button>Login</button>
    </form>

    <div class="links">
        <p>Don't have account?</p>
        <a href="/signup">Create Account</a>
    </div>

</div>

</body>
</html>
